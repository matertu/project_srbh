<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anotações do Boletim</title>
    <link rel="icon" href="assets/img/logo-sgb-cabecalho.png" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }
      body { min-height: 100vh; background: #eef2f7; display: flex; flex-direction: column; }

      header {
        width: 100%; background: #0b3d5c;
        border-bottom: 4px solid #1b6ca8;
        display: flex; justify-content: center; align-items: center; padding: 20px 0;
      }
      .logo-topo { width: 17.5%; object-fit: contain; }

      main { flex: 1; width: 100%; max-width: 1000px; margin: auto; padding: 40px 30px 60px; }

      .user-bar {
        display: flex; justify-content: flex-end; align-items: center;
        gap: 14px; margin-bottom: 18px;
      }
      .user-info { font-size: 14px; color: #0b3d5c; font-weight: bold; }
      .user-info em { font-style: normal; color: #1b6ca8; }
      .btn-logout {
        padding: 7px 18px; border: 2px solid #a32d2d; border-radius: 8px;
        background: transparent; color: #a32d2d; font-size: 13px; font-weight: bold;
        cursor: pointer; transition: 0.2s;
      }
      .btn-logout:hover { background: #fef2f2; }

      .page-header {
        display: flex; align-items: center; gap: 20px;
        margin-bottom: 30px; flex-wrap: wrap;
      }
      .btn-voltar {
        padding: 12px 24px; border: 2px solid #0b3d5c; border-radius: 10px;
        background: transparent; color: #0b3d5c; font-size: 15px; font-weight: bold;
        cursor: pointer; transition: 0.2s; text-decoration: none; display: inline-block;
      }
      .btn-voltar:hover { background: #0b3d5c; color: white; }
      h1.page-title { font-size: 28px; color: #0b3d5c; flex: 1; }

      .badge-status {
        padding: 8px 18px; border-radius: 999px; font-size: 14px; font-weight: bold;
      }
      .status-r        { background: #dbeafe; color: #1e40af; }
      .status-enviado  { background: #dff3e3; color: #207a36; }
      .status-pendente { background: #fff3cd; color: #856404; }
      .status-arquivado{ background: #e2e8f0; color: #475569; }

      .info-banner {
        border-radius: 10px; padding: 16px 22px; font-size: 15px;
        margin-bottom: 20px; display: none;
        border-left: 6px solid #207a36; background: #dff3e3; color: #207a36;
      }
      .info-banner.erro { border-color: #a32d2d; background: #fef2f2; color: #a32d2d; }

      /* CARD INFO DO BOLETIM */
      .card-info {
        background: white; border-radius: 14px;
        padding: 22px 26px; margin-bottom: 24px;
        box-shadow: 0 3px 12px rgba(0,0,0,0.07);
        display: flex; gap: 30px; flex-wrap: wrap;
      }
      .info-item { display: flex; flex-direction: column; gap: 4px; }
      .info-item label { font-size: 12px; font-weight: bold; color: #0b3d5c; text-transform: uppercase; }
      .info-item span  { font-size: 15px; color: #333; }

      /* LISTA DE ANOTAÇÕES */
      .card-anotacoes {
        background: white; border-radius: 14px;
        padding: 28px 26px; margin-bottom: 24px;
        box-shadow: 0 3px 12px rgba(0,0,0,0.07);
      }
      .card-anotacoes h2 {
        font-size: 17px; color: #0b3d5c; margin-bottom: 20px;
        border-bottom: 2px solid #e2e8f0; padding-bottom: 10px;
        text-transform: uppercase; letter-spacing: 0.5px;
      }

      .anotacao-item {
        background: #f8fafc; border-left: 4px solid #1b6ca8;
        border-radius: 0 10px 10px 0; padding: 14px 18px;
        margin-bottom: 14px;
      }
      .anotacao-meta { font-size: 12px; color: #94a3b8; margin-bottom: 6px; }
      .anotacao-texto { font-size: 15px; color: #1e293b; line-height: 1.6; white-space: pre-wrap; }

      .sem-anotacoes {
        text-align: center; padding: 40px 20px;
        color: #94a3b8; font-size: 16px;
      }
      .sem-anotacoes span { font-size: 40px; display: block; margin-bottom: 10px; }

      /* NOVA ANOTAÇÃO */
      .card-nova {
        background: white; border-radius: 14px;
        padding: 28px 26px;
        box-shadow: 0 3px 12px rgba(0,0,0,0.07);
      }
      .card-nova h2 {
        font-size: 17px; color: #0b3d5c; margin-bottom: 18px;
        border-bottom: 2px solid #e2e8f0; padding-bottom: 10px;
        text-transform: uppercase; letter-spacing: 0.5px;
      }
      .card-nova textarea {
        width: 100%; min-height: 130px;
        padding: 14px 16px; border: 2px solid #cfd6dd;
        border-radius: 10px; font-size: 15px; line-height: 1.6;
        resize: vertical; outline: none; transition: 0.2s;
        color: #1e293b; font-family: inherit;
      }
      .card-nova textarea:focus { border-color: #1b6ca8; }
      .card-nova textarea::placeholder { color: #94a3b8; }

      .btn-salvar-anotacao {
        margin-top: 14px; padding: 14px 34px;
        border: none; border-radius: 10px;
        background: #0b3d5c; color: white;
        font-size: 16px; font-weight: bold;
        cursor: pointer; transition: 0.2s;
        box-shadow: 0 3px 10px rgba(0,0,0,0.1);
      }
      .btn-salvar-anotacao:hover    { background: #145b87; }
      .btn-salvar-anotacao:disabled { opacity: 0.6; cursor: default; }

      /* SKELETON */
      .skeleton {
        background: linear-gradient(90deg, #e8edf2 25%, #f5f8fb 50%, #e8edf2 75%);
        background-size: 200% 100%;
        animation: shimmer 1.4s infinite;
        border-radius: 8px; height: 16px; margin-bottom: 10px;
      }
      @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

      footer {
        width: 100%; background: #0b3d5c; border-top: 4px solid #1b6ca8;
        display: flex; justify-content: center; align-items: center; padding: 16px;
      }
      .logo-footer { width: 15%; object-fit: contain; }

      @media (max-width: 700px) {
        h1.page-title { font-size: 22px; }
        .logo-topo, .logo-footer { width: 45%; }
      }
    </style>
  </head>
  <body>
    <header>
      <img src="assets/img/logo-sgb-cabecalho.png" class="logo-topo" alt="SGB" />
    </header>

    <main>
      <div class="user-bar" id="userBar"></div>

      <div class="page-header">
        <a href="dashboard.html" class="btn-voltar">← VOLTAR</a>
        <h1 class="page-title" id="pageTitle">Carregando...</h1>
        <span class="badge-status" id="badgeStatus"></span>
      </div>

      <div class="info-banner" id="infoBanner"></div>

      <!-- INFO DO BOLETIM -->
      <div class="card-info" id="cardInfo" style="display:none;">
        <div class="info-item">
          <label>ID do Boletim</label>
          <span id="vId"></span>
        </div>
        <div class="info-item">
          <label>Referência</label>
          <span id="vRef"></span>
        </div>
        <div class="info-item">
          <label>Estação</label>
          <span id="vEstacao"></span>
        </div>
        <div class="info-item">
          <label>Ficheiro</label>
          <span id="vFicheiro"></span>
        </div>
      </div>

      <!-- ANOTAÇÕES EXISTENTES -->
      <div class="card-anotacoes" id="cardAnotacoes" style="display:none;">
        <h2>📋 Anotações Registradas</h2>
        <div id="listaAnotacoes"></div>
      </div>

      <!-- NOVA ANOTAÇÃO -->
      <div class="card-nova" id="cardNova" style="display:none;">
        <h2>✏️ Nova Anotação</h2>
        <textarea id="textoAnotacao" placeholder="Descreva sua observação técnica sobre este boletim..."></textarea>
        <br/>
        <button class="btn-salvar-anotacao" onclick="salvarNovaAnotacao()">SALVAR ANOTAÇÃO</button>
      </div>

      <!-- SKELETON -->
      <div id="cardSkeleton">
        <div class="card-info">
          <div style="flex:1;"><div class="skeleton"></div><div class="skeleton" style="height:24px;width:60%;"></div></div>
          <div style="flex:1;"><div class="skeleton"></div><div class="skeleton" style="height:24px;width:60%;"></div></div>
        </div>
        <div class="card-anotacoes">
          <div class="skeleton" style="height:22px;width:40%;margin-bottom:20px;"></div>
          <div class="skeleton" style="height:70px;margin-bottom:12px;"></div>
          <div class="skeleton" style="height:70px;"></div>
        </div>
      </div>
    </main>

    <footer>
      <img src="assets/img/logo-sgb-rodape.png" class="logo-footer" alt="SGB" />
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/boletimAPI.js"></script>
    <script>
      // ── Somente técnico ───────────────────────────────────────
      verificarSessao('tecnico');

      document.getElementById('userBar').innerHTML = `
        <span class="user-info">👤 ${getNomeUsuario()} <em>(${getCargo()})</em></span>
        <button class="btn-logout" onclick="logout()">Sair</button>
      `;

      const STATUS_MAP = {
        R: { label: 'RECEBIDO',  classe: 'status-r'         },
        E: { label: 'ENVIADO',   classe: 'status-enviado'   },
        P: { label: 'PENDENTE',  classe: 'status-pendente'  },
        A: { label: 'ARQUIVADO', classe: 'status-arquivado' },
      };

      let BOLETIM_ID_ATUAL = null;

      function formatarData(d) {
        if (!d) return '—';
        const [a, m] = d.split('-');
        return `${m}/${a}`;
      }

      function mostrarBanner(msg, tipo = 'ok') {
        const b = document.getElementById('infoBanner');
        b.textContent   = msg;
        b.className     = `info-banner ${tipo}`;
        b.style.display = 'block';
        setTimeout(() => b.style.display = 'none', 4000);
      }

      function renderizarAnotacoes(lista) {
        const div = document.getElementById('listaAnotacoes');
        if (!lista || lista.length === 0) {
          div.innerHTML = `<div class="sem-anotacoes"><span>📝</span>Nenhuma anotação ainda. Seja o primeiro a anotar.</div>`;
          return;
        }
        div.innerHTML = lista.map(a => {
          const data = a.criado_em
            ? new Date(a.criado_em).toLocaleString('pt-BR')
            : '—';
          return `
            <div class="anotacao-item">
              <div class="anotacao-meta">Técnico ID ${a.id_func ?? '—'} · ${data}</div>
              <div class="anotacao-texto">${a.texto_anotacao}</div>
            </div>
          `;
        }).join('');
      }

      async function salvarNovaAnotacao() {
        const texto = document.getElementById('textoAnotacao').value.trim();
        if (!texto) {
          mostrarBanner('⚠ Escreva algo antes de salvar.', 'erro');
          return;
        }
        const btn = document.querySelector('.btn-salvar-anotacao');
        btn.textContent = 'Salvando...';
        btn.disabled    = true;
        try {
          await salvarAnotacao(BOLETIM_ID_ATUAL, parseInt(getIdUsuario()), texto);
          document.getElementById('textoAnotacao').value = '';
          mostrarBanner('✔ Anotação salva com sucesso!');
          // Recarrega lista
          const anotacoes = await buscarAnotacoes(BOLETIM_ID_ATUAL);
          renderizarAnotacoes(anotacoes);
        } catch (e) {
          mostrarBanner('⚠ Erro ao salvar anotação: ' + e.message, 'erro');
        } finally {
          btn.textContent = 'SALVAR ANOTAÇÃO';
          btn.disabled    = false;
        }
      }

      window.onload = async function () {
        const params = new URLSearchParams(window.location.search);
        const id     = parseInt(params.get('id'));
        if (!id) {
          document.getElementById('pageTitle').textContent = 'ID não informado';
          document.getElementById('cardSkeleton').style.display = 'none';
          return;
        }
        BOLETIM_ID_ATUAL = id;

        try {
          const [boletim, anotacoes] = await Promise.all([
            buscarBoletimPorId(id),
            buscarAnotacoes(id),
          ]);

          if (!boletim) {
            document.getElementById('pageTitle').textContent = 'Boletim não encontrado';
            document.getElementById('cardSkeleton').style.display = 'none';
            return;
          }

          const s = STATUS_MAP[boletim.status_boletim] ?? { label: boletim.status_boletim, classe: 'status-r' };
          document.getElementById('pageTitle').textContent =
            `Anotações — Boletim #${boletim.id_boletim}`;
          const badge = document.getElementById('badgeStatus');
          badge.textContent = s.label;
          badge.className   = `badge-status ${s.classe}`;

          document.getElementById('vId').textContent       = boletim.id_boletim;
          document.getElementById('vRef').textContent      = formatarData(boletim.ano_mes_boletim);
          document.getElementById('vEstacao').textContent  = boletim.id_estacao;
          document.getElementById('vFicheiro').textContent = boletim.ficheiro_boletim ?? '—';

          renderizarAnotacoes(anotacoes);

          document.getElementById('cardSkeleton').style.display  = 'none';
          document.getElementById('cardInfo').style.display      = 'flex';
          document.getElementById('cardAnotacoes').style.display = 'block';
          document.getElementById('cardNova').style.display      = 'block';

        } catch (e) {
          console.error(e);
          document.getElementById('pageTitle').textContent = 'Erro ao carregar';
          mostrarBanner('⚠ ' + e.message, 'erro');
          document.getElementById('cardSkeleton').style.display = 'none';
        }
      };
    </script>
  </body>
</html>
