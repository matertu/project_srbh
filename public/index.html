<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOGIN - Gerenciador de Boletins</title>
  <link rel="stylesheet" href="styles/styles.css" />
  <link rel="icon" href="assets/img/logo-sgb-cabecalho.png" />
</head>

<body>
  <header>
    <img src="assets/img/logo-sgb-cabecalho.png" alt="Logo da Empresa" class="logo-topo" />
  </header>
  <main>

    <div class="login-card" id="mainCard">
      <img class="form-img" src="assets/img/logo-sgb-form.png" alt="" />
      <h1>SRBH</h1>
      <form>
        <div class="input-group">
          <label for="login"> login: </label>
          <input type="text" id="login" placeholder="Digite seu Login" />
        </div>
        <div class="input-group">
          <label for="senha"> Senha: </label>
          <input type="password" id="senha" placeholder="Digite sua senha" />
        </div>

        <button class="login-btn">ENTRAR</button>
      </form>
    </div>
  </main>
  <!-- FOOTER -->
  <footer>
    <img src="assets/img/logo-sgb-rodape.png" alt="Logo da Empresa" class="logo-footer" />
  </footer>
  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/login.js"></script>
</body>

</html>
