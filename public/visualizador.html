<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visualizador de Boletim</title>
    <link rel="icon" href="assets/img/logo-sgb-cabecalho.png" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }
      body { min-height: 100vh; background: #eef2f7; display: flex; flex-direction: column; }

      header {
        width: 100%;
        background: #0b3d5c;
        border-bottom: 4px solid #1b6ca8;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px 0;
      }
      .logo-topo { width: 17.5%; object-fit: contain; }

      main { flex: 1; width: 100%; max-width: 1400px; margin: auto; padding: 40px 30px 60px; }

      /* USER BAR */
      .user-bar {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 14px;
        margin-bottom: 18px;
      }
      .user-info { font-size: 14px; color: #0b3d5c; font-weight: bold; }
      .user-info em { font-style: normal; color: #1b6ca8; }
      .btn-logout {
        padding: 7px 18px;
        border: 2px solid #a32d2d;
        border-radius: 8px;
        background: transparent;
        color: #a32d2d;
        font-size: 13px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
      }
      .btn-logout:hover { background: #fef2f2; }

      .page-header {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 30px;
        flex-wrap: wrap;
      }
      .btn-voltar {
        padding: 12px 24px;
        border: 2px solid #0b3d5c;
        border-radius: 10px;
        background: transparent;
        color: #0b3d5c;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
        text-decoration: none;
        display: inline-block;
      }
      .btn-voltar:hover { background: #0b3d5c; color: white; }

      h1.page-title { font-size: 30px; color: #0b3d5c; flex: 1; }

      .badge-status {
        padding: 8px 18px;
        border-radius: 999px;
        font-size: 14px;
        font-weight: bold;
      }
      .status-r        { background: #dbeafe; color: #1e40af; }
      .status-enviado  { background: #dff3e3; color: #207a36; }
      .status-pendente { background: #fff3cd; color: #856404; }
      .status-arquivado{ background: #e2e8f0; color: #475569; }

      .info-banner {
        border-radius: 10px;
        padding: 20px 24px;
        font-size: 16px;
        margin-bottom: 24px;
        display: none;
        border-left: 6px solid #1b6ca8;
        background: #eef2f7;
        color: #0b3d5c;
      }
      .info-banner.erro { border-color: #a32d2d; background: #fef2f2; color: #a32d2d; }
      .info-banner.ok   { border-color: #207a36; background: #dff3e3; color: #207a36; }

      .form-card {
        background: white;
        border-radius: 18px;
        padding: 35px 30px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        margin-bottom: 30px;
      }

      .meta-row { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
      .meta-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 160px; }
      .meta-group label {
        font-size: 13px; font-weight: bold; color: #0b3d5c;
        text-transform: uppercase; letter-spacing: 0.5px;
      }
      .campo-readonly {
        padding: 10px 14px;
        border: 2px solid #e2e8f0;
        border-radius: 8px;
        font-size: 15px;
        color: #333;
        background: #f8fafc;
        min-height: 42px;
      }

      /* PAINEL DE AÇÕES DO SUPERVISOR */
      .painel-supervisor {
        background: #f0f7ff;
        border: 2px solid #1b6ca8;
        border-radius: 14px;
        padding: 24px 28px;
        margin-bottom: 24px;
        display: flex;
        align-items: center;
        gap: 20px;
        flex-wrap: wrap;
      }
      .painel-supervisor h3 {
        font-size: 15px;
        color: #0b3d5c;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        flex: 1;
      }
      .btn-enviar-ana {
        padding: 13px 30px;
        border: none;
        border-radius: 10px;
        background: #207a36;
        color: white;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
        box-shadow: 0 3px 10px rgba(0,0,0,0.1);
      }
      .btn-enviar-ana:hover  { background: #185e2a; }
      .btn-enviar-ana:disabled { opacity: 0.6; cursor: default; }

      .btn-arquivar {
        padding: 13px 30px;
        border: 2px solid #475569;
        border-radius: 10px;
        background: transparent;
        color: #475569;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
      }
      .btn-arquivar:hover { background: #e2e8f0; }

      /* IMAGEM */
      .imagem-section { margin-top: 10px; }
      .imagem-section h2 {
        font-size: 15px; font-weight: bold; color: #0b3d5c;
        text-transform: uppercase; letter-spacing: 0.5px;
        margin-bottom: 14px;
        border-bottom: 2px solid #e2e8f0;
        padding-bottom: 10px;
      }
      .imagem-container {
        border: 2px solid #e2e8f0;
        border-radius: 14px;
        background: #f8fafc;
        min-height: 300px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        padding: 16px;
      }
      .imagem-container img {
        max-width: 100%;
        max-height: 700px;
        object-fit: contain;
        border-radius: 8px;
        box-shadow: 0 4px 14px rgba(0,0,0,0.1);
      }
      .imagem-ausente {
        display: flex; flex-direction: column;
        align-items: center; gap: 12px;
        color: #94a3b8; font-size: 16px; padding: 60px 20px;
      }
      .imagem-ausente span { font-size: 52px; }
      .btn-download {
        display: inline-flex; align-items: center; gap: 8px;
        margin-top: 16px; padding: 12px 26px;
        background: #0b3d5c; color: white;
        border: none; border-radius: 10px;
        font-size: 15px; font-weight: bold;
        cursor: pointer; text-decoration: none; transition: 0.2s;
      }
      .btn-download:hover { background: #145b87; }

      /* SKELETON */
      .skeleton {
        background: linear-gradient(90deg, #e8edf2 25%, #f5f8fb 50%, #e8edf2 75%);
        background-size: 200% 100%;
        animation: shimmer 1.4s infinite;
        border-radius: 8px; height: 16px; margin-bottom: 8px;
      }
      @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

      footer {
        width: 100%; background: #0b3d5c;
        border-top: 4px solid #1b6ca8;
        display: flex; justify-content: center; align-items: center; padding: 16px;
      }
      .logo-footer { width: 15%; object-fit: contain; }

      @media (max-width: 700px) {
        h1.page-title { font-size: 22px; }
        .logo-topo, .logo-footer { width: 45%; }
      }
    </style>
  </head>
  <body>
    <header>
      <img src="assets/img/logo-sgb-cabecalho.png" class="logo-topo" alt="SGB" />
    </header>

    <main>
      <div class="user-bar" id="userBar"></div>

      <div class="page-header">
        <a href="dashboard.html" class="btn-voltar">← VOLTAR</a>
        <h1 class="page-title" id="pageTitle">Carregando boletim...</h1>
        <span class="badge-status" id="badgeStatus"></span>
      </div>

      <div class="info-banner" id="infoBanner"></div>

      <!-- PAINEL SUPERVISOR (aparece só para supervisor) -->
      <div class="painel-supervisor" id="painelSupervisor" style="display:none;">
        <h3>🔒 Ações do Supervisor</h3>
        <button class="btn-enviar-ana" id="btnEnviarAna" onclick="marcarComoEnviado()">
          ✅ Marcar como Enviado à ANA
        </button>
        <button class="btn-arquivar" onclick="arquivarBoletim()">
          📂 Arquivar Boletim
        </button>
      </div>

      <div class="form-card" id="cardMetadados" style="display:none;">
        <div class="meta-row">
          <div class="meta-group">
            <label>ID do Boletim</label>
            <div class="campo-readonly" id="vIdBoletim"></div>
          </div>
          <div class="meta-group">
            <label>Referência (Mês/Ano)</label>
            <div class="campo-readonly" id="vRefData"></div>
          </div>
          <div class="meta-group">
            <label>Data de Recebimento</label>
            <div class="campo-readonly" id="vDataReceb"></div>
          </div>
          <div class="meta-group">
            <label>ID da Estação</label>
            <div class="campo-readonly" id="vEstacao"></div>
          </div>
          <div class="meta-group">
            <label>ID do Funcionário</label>
            <div class="campo-readonly" id="vFunc"></div>
          </div>
          <div class="meta-group">
            <label>Ficheiro</label>
            <div class="campo-readonly" id="vFicheiro"></div>
          </div>
        </div>

        <div class="imagem-section">
          <h2>📄 Imagem do Boletim</h2>
          <div class="imagem-container" id="imagemContainer"></div>
        </div>
      </div>

      <!-- SKELETON -->
      <div class="form-card" id="cardSkeleton">
        <div class="meta-row">
          <div class="meta-group"><div class="skeleton"></div><div class="skeleton" style="height:42px;"></div></div>
          <div class="meta-group"><div class="skeleton"></div><div class="skeleton" style="height:42px;"></div></div>
          <div class="meta-group"><div class="skeleton"></div><div class="skeleton" style="height:42px;"></div></div>
          <div class="meta-group"><div class="skeleton"></div><div class="skeleton" style="height:42px;"></div></div>
        </div>
        <div class="skeleton" style="height:350px; border-radius:12px;"></div>
      </div>
    </main>

    <footer>
      <img src="assets/img/logo-sgb-rodape.png" class="logo-footer" alt="SGB" />
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/boletimAPI.js"></script>
    <script>
      // ── Verifica: só supervisor ───────────────────────────────
      verificarSessao(['tecnico', 'supervisor']);

      // Monta user bar
      const bar = document.getElementById('userBar');
      bar.innerHTML = `
        <span class="user-info">👤 ${getNomeUsuario()} <em>(${getCargo()})</em></span>
        <button class="btn-logout" onclick="logout()">Sair</button>
      `;

      // Painel de ações só para supervisor
      const _cargo = getCargo();
      if (_cargo !== 'supervisor') {
        const painel = document.getElementById('painelSupervisor');
        if (painel) painel.style.display = 'none';
      }

      const STATUS_MAP = {
        R: { label: 'RECEBIDO',  classe: 'status-r'         },
        E: { label: 'ENVIADO',   classe: 'status-enviado'   },
        P: { label: 'PENDENTE',  classe: 'status-pendente'  },
        A: { label: 'ARQUIVADO', classe: 'status-arquivado' },
      };

      let BOLETIM_ID_ATUAL = null;

      function formatarData(dataStr) {
        if (!dataStr) return '—';
        const [ano, mes] = dataStr.split('-');
        return `${mes}/${ano}`;
      }

      function mostrarBanner(msg, tipo = 'ok') {
        const b = document.getElementById('infoBanner');
        b.textContent   = msg;
        b.className     = `info-banner ${tipo}`;
        b.style.display = 'block';
        setTimeout(() => b.style.display = 'none', 4000);
      }

      function mostrarErro(msg) {
        mostrarBanner('⚠ ' + msg, 'erro');
        document.getElementById('pageTitle').textContent = 'Erro ao carregar boletim';
      }

      function renderizarImagem(boletim) {
        const container = document.getElementById('imagemContainer');
        const ficheiro  = boletim.ficheiro_boletim;
        if (!ficheiro) {
          container.innerHTML = `<div class="imagem-ausente"><span>🖼️</span><p>Nenhuma imagem registrada.</p></div>`;
          return;
        }
        const urlImagem = `assets/boletins/${ficheiro}`;
        const img = document.createElement('img');
        img.alt = ficheiro;
        img.src = urlImagem;
        img.onerror = () => {
          container.innerHTML = `<div class="imagem-ausente"><span>📂</span><p>Imagem não encontrada no servidor.</p><p style="font-size:13px;color:#64748b;margin-top:4px;">${ficheiro}</p></div>`;
        };
        container.innerHTML = '';
        container.appendChild(img);

        const dl = document.createElement('a');
        dl.href = urlImagem; dl.download = ficheiro;
        dl.className = 'btn-download'; dl.textContent = '⬇ Baixar imagem';
        dl.style.marginTop = '16px'; dl.style.display = 'block';
        container.parentElement.appendChild(dl);
      }

      function preencherMetadados(boletim) {
        const s = STATUS_MAP[boletim.status_boletim] ?? { label: boletim.status_boletim, classe: 'status-r' };
        document.getElementById('pageTitle').textContent =
          `Boletim #${boletim.id_boletim} — ${formatarData(boletim.ano_mes_boletim)}`;
        const badge = document.getElementById('badgeStatus');
        badge.textContent = s.label;
        badge.className   = `badge-status ${s.classe}`;
        document.getElementById('vIdBoletim').textContent = boletim.id_boletim;
        document.getElementById('vRefData').textContent   = formatarData(boletim.ano_mes_boletim);
        document.getElementById('vDataReceb').textContent = formatarData(boletim.data_recebimento_boletim);
        document.getElementById('vEstacao').textContent   = boletim.id_estacao;
        document.getElementById('vFunc').textContent      = boletim.id_func ?? '—';
        document.getElementById('vFicheiro').textContent  = boletim.ficheiro_boletim ?? '—';

        // Desabilita botão de enviar se já enviado
        const btnEnviar = document.getElementById('btnEnviarAna');
        if (boletim.status_boletim === 'E') {
          btnEnviar.textContent = '✅ Já enviado à ANA';
          btnEnviar.disabled    = true;
        }
      }

      async function marcarComoEnviado() {
        if (!BOLETIM_ID_ATUAL) return;
        const btn = document.getElementById('btnEnviarAna');
        btn.textContent = 'Salvando...';
        btn.disabled    = true;
        try {
          await mudarStatusBoletim(BOLETIM_ID_ATUAL, 'E');
          document.getElementById('badgeStatus').textContent  = 'ENVIADO';
          document.getElementById('badgeStatus').className    = 'badge-status status-enviado';
          btn.textContent = '✅ Já enviado à ANA';
          mostrarBanner('✔ Status atualizado para ENVIADO.', 'ok');
        } catch (e) {
          btn.textContent = '✅ Marcar como Enviado à ANA';
          btn.disabled    = false;
          mostrarBanner('⚠ Erro ao atualizar status: ' + e.message, 'erro');
        }
      }

      async function arquivarBoletim() {
        if (!BOLETIM_ID_ATUAL) return;
        if (!confirm('Deseja arquivar este boletim?')) return;
        try {
          await mudarStatusBoletim(BOLETIM_ID_ATUAL, 'A');
          document.getElementById('badgeStatus').textContent = 'ARQUIVADO';
          document.getElementById('badgeStatus').className   = 'badge-status status-arquivado';
          mostrarBanner('✔ Boletim arquivado com sucesso.', 'ok');
        } catch (e) {
          mostrarBanner('⚠ Erro ao arquivar: ' + e.message, 'erro');
        }
      }

      window.onload = async function () {
        const params = new URLSearchParams(window.location.search);
        const id     = parseInt(params.get('id'));
        if (!id) {
          mostrarErro('Nenhum ID de boletim informado na URL.');
          document.getElementById('cardSkeleton').style.display = 'none';
          return;
        }
        BOLETIM_ID_ATUAL = id;
        try {
          const boletim = await buscarBoletimPorId(id);
          if (!boletim) {
            mostrarErro(`Boletim #${id} não encontrado.`);
            document.getElementById('cardSkeleton').style.display = 'none';
            return;
          }
          preencherMetadados(boletim);
          renderizarImagem(boletim);
          document.getElementById('painelSupervisor').style.display = 'flex';
          document.getElementById('cardSkeleton').style.display     = 'none';
          document.getElementById('cardMetadados').style.display    = 'block';
        } catch (e) {
          console.error(e);
          mostrarErro('Falha ao buscar boletim: ' + e.message);
          document.getElementById('cardSkeleton').style.display = 'none';
        }
      };
    </script>
  </body>
</html>
