<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAINEL DO ADMINISTRADOR - Gerenciador de Boletins</title>
  <link rel="stylesheet" href="styles/styles.css">
  <link rel="stylesheet" href="styles/admin.css">
  <link rel="icon" href="assets/img/logo-sgb-cabecalho.png" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- HEADER -->
  <header>
    <img src="assets/img/logo-sgb-cabecalho.png" alt="Logo da Empresa" class="logo-topo" />
  </header>

  <!-- MAIN -->
  <main class="admin-main">
    <!-- Botão de Voltar -->
    <a href="index.html" class="voltar-btn">
      <span>← Voltar ao Login</span>
    </a>

    <div class="admin-container">
      <!-- Formulário de Cadastro -->
      <div class="card-admin shadow-premium">
        <div class="card-header">
          <img class="card-logo" src="assets/img/logo-sgb-form.png" alt="Logo SGB" />
          <h2>Novo Funcionário</h2>
          <p class="subtitle">Adicione credenciais de acesso no banco de dados</p>
        </div>

        <form id="formFuncionario">
          <div class="input-group">
            <label for="nome_func">Nome Completo:</label>
            <input type="text" id="nome_func" placeholder="Nome do funcionário" required>
          </div>

          <div class="input-group">
            <label for="login_func">Login de Acesso:</label>
            <input type="text" id="login_func" placeholder="Defina o login do usuário" required>
          </div>

          <div class="input-group">
            <label for="senha_func">Senha:</label>
            <input type="text" id="senha_func" placeholder="Senha do funcionário" required>
          </div>

          <div class="input-group">
            <label for="tipo_func">Função / Cargo:</label>
            <select id="tipo_func" required>
              <option value="" disabled selected>Selecione a função...</option>
              <option value="tecnico">Técnico</option>
              <option value="supervisor">Supervisor</option>
              <option value="digitador">Digitador</option>
              <option value="alimentador">Alimentador</option>
            </select>
          </div>

          <button type="submit" class="btn-cadastrar-func">
            <span>CADASTRAR FUNCIONÁRIO</span>
          </button>
        </form>
      </div>

      <!-- Listagem de Colaboradores -->
      <div class="card-admin list-card shadow-premium">
        <div class="card-header-list">
          <h2>Funcionários Cadastrados</h2>
          <span class="badge" id="totalFuncionarios">0</span>
        </div>
        <p class="subtitle-list">Visualização dos colaboradores ativos no sistema</p>

        <!-- Loader -->
        <div id="loader" class="loader-container">
          <div class="spinner"></div>
          <p>Carregando dados do Supabase...</p>
        </div>

        <!-- Lista Vazia -->
        <div id="listaVazia" class="lista-vazia" style="display: none;">
          <p>Nenhum funcionário cadastrado no banco de dados.</p>
        </div>

        <!-- Lista Dinâmica -->
        <div class="funcionarios-list" id="funcionariosList">
          <!-- Gerado via Javascript -->
        </div>
      </div>
    </div>
  </main>

  <footer>
    <img src="assets/img/logo-sgb-rodape.png" alt="Logo da Empresa" class="logo-footer" />
  </footer>

  <div id="toast" class="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
