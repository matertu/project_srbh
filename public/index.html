<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOGIN - Gerenciador de Boletins</title>
  <link rel="stylesheet" href="styles/styles.css?v=2" />
  <link rel="icon" href="assets/img/logo-sgb-cabecalho.png" />
</head>

<body>
  <!-- HEADER -->
  <header>
    <img src="assets/img/logo-sgb-cabecalho.png" alt="Logo da Empresa" class="logo-topo" />
  </header>
  <!-- MAIN -->
  <main>
    <div class="login-card" id="mainCard">
      <img class="form-img" src="assets/img/logo-sgb-form.png" alt="" />
      <h1>Gerenciador de Boletins</h1>
      <form>
        <div class="input-group">
          <label for="email"> Email (Login): </label>
          <input type="email" id="email" placeholder="Digite seu email" />
        </div>
        <div class="input-group">
          <label for="senha"> Senha: </label>
          <input type="password" id="senha" placeholder="Digite sua senha" />
        </div>

        <button type="button" class="login-btn" onclick="fazerlogin()">ENTRAR</button>
        
        <p style="text-align: center; margin-top: 20px; font-size: 14px; color: #0b3d5c; cursor: pointer; text-decoration: underline; font-weight: bold;" onclick="window.location.href='recuperar-senha.html'">
          Esqueci minha senha
        </p>
      </form>
    </div>
  </main>
  <!-- FOOTER -->
  <footer>
    <img src="assets/img/logo-sgb-rodape.png" alt="Logo da Empresa" class="logo-footer" />
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/login.js"></script>
</body>

</html>
