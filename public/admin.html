<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Gerenciador de Boletins</title>
  <link rel="stylesheet" href="styles/styles.css?v=2" />
  <link rel="icon" href="assets/img/logo-sgb-cabecalho.png" />
</head>

<body>
  <!-- HEADER -->
  <header>
    <img src="assets/img/logo-sgb-cabecalho.png" alt="Logo da Empresa" class="logo-topo" />
  </header>
  
  <!-- MAIN -->
  <main class="admin-container">
    <div class="admin-header-buttons">
      <button class="admin-btn" onclick="window.location.href='index.html'" style="margin: 0; width: auto; padding: 10px 20px;">
        ← INÍCIO
      </button>
      <button class="admin-btn" onclick="logoutAdmin()" style="margin: 0; width: auto; padding: 10px 20px; background-color: #d62828;">
        SAIR (LOGOUT)
      </button>
    </div>

    <!-- BLOCO DE CADASTRO -->
    <div class="admin-card">
      <div class="form-title-wrapper">
        <img src="assets/img/logo-sgb-form.png" />
        <h1>CADASTRO DE FUNCIONÁRIOS</h1>
      </div>
      
      <form class="grid-form">
        <div class="input-group">
          <label>Nome Completo:</label>
          <input type="text" id="nomeFuncionario" placeholder="Digite o nome" />
        </div>
        <div class="input-group">
          <label>Email (Login):</label>
          <input type="email" id="loginFuncionario" placeholder="Digite o email" />
        </div>
        <div class="input-group">
          <label>Tipo de Funcionário:</label>
          <select id="tipoFuncionario" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; margin-top: 5px; outline: none; font-size: 16px; background: white;">
            <option value="técnico">Técnico</option>
            <option value="supervisor">Supervisor</option>
            <option value="digitador">Digitador</option>
            <option value="alimentador">Alimentador</option>
            <option value="administrador">Administrador</option>
          </select>
        </div>
        <div class="input-group">
          <label>Senha do funcionário:</label>
          <input type="password" id="senhaFuncionario" placeholder="Digite a senha" />
        </div>
        
        <button type="button" class="login-btn" onclick="cadastrarFuncionario()" style="grid-column: 1 / -1; margin-top: 10px; max-width: 400px; margin-left: auto; margin-right: auto; width: 100%;">CADASTRAR</button>
      </form>
    </div>

    <!-- BLOCO DE LISTAGEM -->
    <div class="admin-card">
      <div class="list-header">
        <h1>LISTA DE FUNCIONÁRIOS</h1>
        <button class="login-btn" onclick="listarFuncionarios()" style="width: auto; margin: 0; padding: 10px 20px;">🔄 ATUALIZAR</button>
      </div>
      
      <div id="listaFuncionarios" class="grid-list"></div>
    </div>
  </main>
  
  <!-- FOOTER -->
  <footer>
    <img src="assets/img/logo-sgb-rodape.png" alt="Logo da Empresa" class="logo-footer" />
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/admin.js"></script>
</body>

</html>
