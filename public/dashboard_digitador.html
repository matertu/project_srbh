<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Alimentador / Digitador</title>
    <link rel="stylesheet" href="styles/dashboard.css" />
    <link rel="icon" href="assets/img/logo-sgb-cabecalho.png" />
  </head>
  <body>
    <!-- HEADER -->
    <header>
      <img src="assets/img/logo-sgb-cabecalho.png" class="logo-topo" />
    </header>

    <!-- MAIN -->
    <main>
      <h1 class="dashboard-title">Painel do Alimentador / Digitador - Serviço Geológico do Brasil</h1>

      <!-- STATUS -->
      <div class="status-container">
        <div class="status-card">
          <h2>BOLETINS ENVIADOS À ANA</h2>
          <p id="txtEnviados">Carregando...</p>
        </div>
        <div class="status-card">
          <h2>BOLETINS PENDENTES</h2>
          <p id="txtPendentes">Carregando...</p>
        </div>
      </div>

      <!-- ERRO -->
      <div class="erro-banner" id="erroBanner"></div>

      <!-- AÇÕES -->
      <div class="dashboard-actions">
        <a href="boletim-form.html" class="btn-adicionar">
          <span class="icone">＋</span> ADICIONAR BOLETIM
        </a>
      </div>

      <!-- CONTADOR -->
      <div class="contador-boletins">
        <h2>Boletins digitalizados: <span id="contadorBoletins">0</span></h2>
      </div>

      <!-- GRID -->
      <div class="boletins-grid" id="boletinsGrid">
        <!-- Skeletons enquanto carrega -->
        <div class="boletim-card loading">
          <div class="skeleton"></div>
          <div class="skeleton short"></div>
          <div class="skeleton short"></div>
        </div>
        <div class="boletim-card loading">
          <div class="skeleton"></div>
          <div class="skeleton short"></div>
          <div class="skeleton short"></div>
        </div>
        <div class="boletim-card loading">
          <div class="skeleton"></div>
          <div class="skeleton short"></div>
          <div class="skeleton short"></div>
        </div>
      </div>

      <!-- BOTÃO ARQUIVADOS -->
      <div class="arquivados-container">
        <button class="arquivados-btn" onclick="visualizarArquivados()">
          VISUALIZAR BOLETINS ARQUIVADOS
        </button>
      </div>
    </main>

    <!-- FOOTER -->
    <footer>
      <img src="assets/img/logo-sgb-rodape.png" class="logo-footer" />
    </footer>

    <script src="js/config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/digitador/card.js"></script>
    <script src="js/digitador/loader.js"></script>
    <script src="js/digitador/navigation.js"></script>
    <script src="js/digitador/init.js"></script>
  </body>
</html>
