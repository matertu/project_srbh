<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOGIN - Gerenciador de Boletins</title>
    <link rel="stylesheet" href="styles/styles.css" />
    <link rel="icon" href="assets/img/logo-sgb-cabecalho.png" />
  </head>
  <body>
    <!-- HEADER -->
    <header>
      <img
        src="assets/img/logo-sgb-cabecalho.png"
        alt="Logo da Empresa"
        class="logo-topo"
      />
    </header>
    <!-- MAIN -->
    <main>
      <button class="admin-btn" id="adminButton" onclick="abrirAdmin()">
        ADMIN
      </button>
      <div class="login-card" id="mainCard">
        <img class="form-img" src="assets/img/logo-sgb-form.png" alt="" />
        <h1>Gerenciador de Boletins</h1>
        <form>
          <div class="input-group">
            <label for="cpf"> CPF: </label>
            <input type="text" id="cpf" placeholder="Digite seu CPF" />
          </div>
          <div class="input-group">
            <label for="senha"> Senha: </label>
            <input type="password" id="senha" placeholder="Digite sua senha" />
          </div>

          <button class="login-btn">ENTRAR</button>
        </form>
      </div>
    </main>
    <!-- FOOTER -->
    <footer>
      <img
        src="assets/img/logo-sgb-rodape.png"
        alt="Logo da Empresa"
        class="logo-footer"
      />
    </footer>
    <script src="js/admin.js"></script>
  </body>
</html>
